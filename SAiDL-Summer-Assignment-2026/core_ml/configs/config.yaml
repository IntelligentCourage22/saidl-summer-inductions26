
model:
  vocab_size: 50257
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 1024
  attention_type: "standard"      # swap: standard | sliding_window | sparse | linear | mqa | gqa
  positional_encoding: "sinusoidal"  # swap: sinusoidal | rope | alibi | relative
  block_type: "standard"          # swap: standard | conv_before | interleaved | gated_conv

training:
  batch_size: 8
  learning_rate: 3e-4
  num_epochs: 10
  warmup_steps: 1000
  grad_clip: 1.0
  seq_len: 1024
  eval_every: 500
  save_every: 1000
  seed: 42

data:
  dataset_name: "wikitext"
  dataset_config: "wikitext-2-raw-v1"
  tokenizer_name: "gpt2"
  num_workers: 2

wandb:
  project: "SAiDL-LongContext"
  entity: ansh0   #wandb username here
