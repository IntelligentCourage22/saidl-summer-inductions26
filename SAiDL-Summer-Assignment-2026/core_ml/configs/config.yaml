
model:
  vocab_size: 50257
  d_model: 512
  n_heads: 8
  n_kv_heads: 2
  n_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 1024
  window_size: 256
  conv_kernel_size: 5
  attention_type: "standard"      # standard | sliding_window | linear | mqa | gqa
  positional_encoding: "sinusoidal"  # sinusoidal | rope | alibi | relative | none
  block_type: "standard"          # swap: standard | conv_before | interleaved | gated_conv

training:
  batch_size: 8
  learning_rate: 3e-4
  num_epochs: 10
  warmup_steps: 1000
  grad_clip: 1.0
  seq_len: 1024
  eval_every: 500
  eval_batches: null    # set to 50 for fast iteration, null for final reported numbers
  save_every: 1000
  max_steps: null
  seed: 42
  output_dir: "outputs/core_ml"
  checkpoint_dir: "checkpoints/core_ml"

data:
  dataset_name: "wikitext"
  dataset_config: "wikitext-2-raw-v1"
  tokenizer_name: "gpt2"
  num_workers: 2

wandb:
  enabled: true
  project: "SAiDL-LongContext"
  entity: ansh0   #wandb username here
